apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: shelter-volunteers
spec:
  # Block all inbound traffic unless a later policy allows it.
  podSelector: {}
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-client
  namespace: shelter-volunteers
spec:
  # Allow the nginx ingress controller to reach the client pods.
  podSelector:
    matchLabels:
      app: shelter-client
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-server
  namespace: shelter-volunteers
spec:
  # Allow the nginx ingress controller to reach the server pods.
  podSelector:
    matchLabels:
      app: shelter-server
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
  policyTypes:
  - Ingress

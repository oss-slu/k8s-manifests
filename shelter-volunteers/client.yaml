apiVersion: apps/v1
kind: Deployment
metadata:
  name: shelter-client
  namespace: shelter-volunteers
spec:
  # Run a single client replica for the shelter volunteers app.
  replicas: 1
  selector:
    matchLabels:
      app: shelter-client
  template:
    metadata:
      labels:
        app: shelter-client
    spec:
      # Pull the private image from GitHub Container Registry.
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: client
        image: ghcr.io/oss-slu/shelter_volunteers/client:dev
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        # Backend API endpoint used by the React client.
        - name: REACT_APP_SERVER_URL
          value: https://elected-marble-clean-seeking.trycloudflare.com/shelter-api
        # Serve the app from the /shelter path prefix.
        - name: PUBLIC_URL
          value: /shelter
        # Required for local-style development hosting behind Kubernetes.
        - name: DANGEROUSLY_DISABLE_HOST_CHECK
          value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: shelter-client
  namespace: shelter-volunteers
spec:
  # Expose the client pod inside the cluster on port 3000.
  selector:
    app: shelter-client
  ports:
  - port: 3000
    targetPort: 3000

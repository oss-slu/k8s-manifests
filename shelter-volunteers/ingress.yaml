apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shelter-volunteers
  namespace: shelter-volunteers
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /shelter
        pathType: Prefix
        backend:
          service:
            name: shelter-client
            port:
              number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shelter-api
  namespace: shelter-volunteers
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /shelter-api(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: shelter-server
            port:
              number: 5001

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: oss-dev-analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/oss-slu/oss_dev_analytics/frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        volumeMounts:
        - name: analytics-data
          mountPath: /usr/share/nginx/html/data
          readOnly: true
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 128Mi
            cpu: 200m
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: analytics-data
        persistentVolumeClaim:
          claimName: analytics-data
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: oss-dev-analytics
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
